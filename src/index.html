<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>CaretEDA | AI-native, Silicon-ready, Open-Source enabled</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/careteda-logo-hd.png">
  <script>
    // GitHub Pages SPA — restore path from query string redirect
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location));
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
